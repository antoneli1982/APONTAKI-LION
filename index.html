function cpGas(){navigator.clipboard.writeText(GAS_CODE).then(()=>toast('Código copiado!','a'));}
function savCfg(){
  const url=document.getElementById('su').value.trim(),en=document.getElementById('se').checked;
  const fbUrl=document.getElementById('fb-url')?document.getElementById('fb-url').value.trim():'';
  const fbTok=document.getElementById('fb-tok')?document.getElementById('fb-tok').value.trim():'';
  const fbEn=document.getElementById('fb-en')?document.getElementById('fb-en').checked:false;
  DB.config=Object.assign(DB.config||{},{
    sheetsUrl:url,sheetsEnabled:en&&!!url,
    firebaseUrl:fbUrl,firebaseToken:fbTok,firebaseEnabled:fbEn&&!!fbUrl
  });
  if(DB.config.firebaseEnabled){fbStartPoll();}else if(_fbPolling){clearInterval(_fbPolling);_fbPolling=null;}
  sdb();us();
  toast(DB.config.firebaseEnabled?'Firebase ativado! ☁️':DB.config.sheetsEnabled?'Sheets ativado! ✅':'Configuração salva.');
}
async function tstCfg(){const url=document.getElementById('su').value.trim();if(!url){toast('Informe a URL.','r');return;}toast('Testando…','b');try{const r=await fetch(url);if(r.ok)toast('Conexão OK! ✅','g');else toast('Erro HTTP '+r.status,'r');}catch(e){toast('Falha na conexão.','r');}}
async function envPend(){
  if(!DB.config.sheetsEnabled||!DB.config.sheetsUrl){toast('Configure o Sheets primeiro.','r');return;}
  const pend=DB.apontamentos.filter(a=>a.status==='encerrado'&&!a.syncado);
  if(!pend.length){toast('Nenhum pendente!','a');return;}
  let ok=0,er=0;for(const a of pend){const r=await sendSheets(a);if(r.ok){a.syncado=true;ok++;}else er++;}
  sdb();toast(`Enviados: ${ok}${er?' · Erros: '+er:''}`);rCfg();
}

// ══ INIT ═══════════════════════════════════════════════════════════
(function initApp(){
  try{ us(); }catch(e){ console.warn('us() err:',e); }

  function _startSession(){
    try{
      const sid = localStorage.getItem('apontaki_session');
      if(sid){
        let u = DB.users.find(x => x.id == sid || String(x.id)===String(sid));
        if(!u){
          try{
            const snap=JSON.parse(localStorage.getItem('apontaki_session_user')||'null');
            if(snap&&snap.id&&(snap.id==sid||String(snap.id)===String(sid))){
              u=snap;
              if(!DB.users.find(x=>String(x.id)===String(snap.id))){DB.users.push(snap);sdb();}
            }
          }catch(e2){}
        }
        if(u){ CU=u; updSbUser(); updNav(); sv(u.role==='operacional'?'apont':'dashboard'); return; }
        try{ localStorage.removeItem('apontaki_session'); }catch(e){}
      }
      showLS();
    }catch(e){
      console.error('Init error:',e);
      try{ showLS(); }catch(e2){ console.error('showLS fallback err:',e2); }
    }
  }

  // Firebase: mostrar loading e bloquear interação até sincronizar
  if(DB.config&&DB.config.firebaseEnabled&&DB.config.firebaseUrl){
    // Mostrar tela de carregamento — bloqueia cadastro prematuro
    const ls=document.getElementById('ls');
    const lsb=document.getElementById('ls-body');
    if(ls&&lsb){
      ls.style.display='flex';
      lsb.innerHTML=`<div style="text-align:center;padding:48px 20px">
        <div style="font-size:42px;margin-bottom:16px;animation:pulse 1.5s infinite">☁️</div>
        <div style="font-size:14px;font-weight:700;color:var(--tx);margin-bottom:6px">Sincronizando dados...</div>
        <div style="font-size:12px;color:var(--tx3)">Conectando ao Firebase</div>
      </div>`;
    }
    fbLoad().then(function(ok){
      if(ok)us();
      fbStartPoll();
      _startSession();
    }).catch(function(){
      fbStartPoll();
      _startSession();
    });
  } else {
    _startSession();
  }
})();
// Safety net: fallback após 5s se Firebase não responder
setTimeout(function(){
  try{
    const b=document.getElementById('ls-body');
    const l=document.getElementById('ls');
    // Se ainda está na tela de loading após 5s, forçar renderização
    if(b&&b.innerHTML.includes('Sincronizando dados')&&l){
      console.warn('[Firebase] Timeout — usando dados locais');
      showLS();
    }
  }catch(e){}
},5000);
