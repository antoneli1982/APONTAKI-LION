<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>APONTAKI LION</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080706;--bg2:#0f0d0b;--bg3:#151210;--bg4:#1a1714;--bg5:#201d19;
  --bd:#2a2420;--bd2:#3a3028;--bd3:#4a4038;
  --tx:#f5f0e8;--tx2:#a09080;--tx3:#5a4e44;
  --gold:#f0b429;--gold2:#c8941a;--gold-bg:rgba(240,180,41,.09);--gold-glow:rgba(240,180,41,.28);
  --blue:#38bdf8;--blue-bg:rgba(56,189,248,.08);
  --violet:#a78bfa;--violet2:#8b5cf6;--violet-bg:rgba(167,139,250,.08);
  --green:#34d399;--green2:#10b981;--green-bg:rgba(52,211,153,.08);
  --red:#fb7185;--red2:#f43f5e;--red-bg:rgba(251,113,133,.08);
  --orange:#fb923c;--orange-bg:rgba(251,146,60,.08);
  --cyan:#22d3ee;--cyan2:#06b6d4;--cyan-bg:rgba(34,211,238,.08);
  --r:6px;--rl:10px;--rxl:16px;
  --F:'Plus Jakarta Sans',sans-serif;--FM:'JetBrains Mono',monospace;
  --sw:252px;--th:60px;
  --ease:.15s cubic-bezier(.4,0,.2,1);
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--F);background:var(--bg);color:var(--tx);display:flex;position:relative}
/* ── Background LION — carbon fiber + glow ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    repeating-linear-gradient(135deg,transparent 0px,transparent 18px,rgba(240,180,41,.018) 18px,rgba(240,180,41,.018) 19px),
    repeating-linear-gradient(45deg,transparent 0px,transparent 18px,rgba(240,180,41,.012) 18px,rgba(240,180,41,.012) 19px),
    repeating-linear-gradient(0deg,transparent 0px,transparent 3px,rgba(255,255,255,.008) 3px,rgba(255,255,255,.008) 4px),
    radial-gradient(ellipse 80% 60% at 15% 85%,rgba(240,140,20,.07) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 85% 10%,rgba(200,100,0,.05) 0%,transparent 55%),
    radial-gradient(ellipse 100% 100% at 50% 50%,#0f0b08 0%,#060504 100%);
}
body>*{position:relative;z-index:1}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd3);border-radius:4px}

/* ── SIDEBAR ── */
.sb{width:var(--sw);background:rgba(12,9,7,.97);border-right:1px solid rgba(240,180,41,.1);display:flex;flex-direction:column;flex-shrink:0;height:100vh;position:sticky;top:0;z-index:10;box-shadow:4px 0 24px rgba(0,0,0,.4)}
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid rgba(240,180,41,.1);display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,rgba(240,140,20,.08) 0%,transparent 60%);border-top:2px solid rgba(240,180,41,.3)}
.sb-logo-img{width:40px;height:40px;border-radius:10px;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;border:1px solid rgba(240,180,41,.25);box-shadow:0 0 0 3px rgba(240,180,41,.06)}
.sb-logo-img img{width:100%;height:100%;object-fit:contain}
.brand{font-family:var(--F);font-size:15px;font-weight:800;letter-spacing:.5px;color:var(--tx);line-height:1}
.brand em{color:var(--gold);font-style:normal}
.brand-sub{font-size:9px;color:var(--tx3);letter-spacing:2.5px;text-transform:uppercase;margin-top:4px;font-weight:600}
.sec{padding:16px 16px 5px;font-size:9px;color:var(--tx3);letter-spacing:3px;text-transform:uppercase;font-weight:700}
.ni{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--r);margin:1px 8px;cursor:pointer;transition:all var(--ease);font-size:12px;font-weight:500;color:var(--tx2);border-left:2px solid transparent}
.ni:hover{background:var(--bg4);color:var(--tx);border-left-color:var(--bd2)}
.ni.on{background:var(--gold-bg);color:var(--gold);border-left:2px solid var(--gold);font-weight:600}
.ni svg{width:15px;height:15px;flex-shrink:0;opacity:.65}
.ni.on svg{opacity:1}
.ni .nb{margin-left:auto;background:var(--red2);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;letter-spacing:.3px}
.sb-foot{margin-top:auto;padding:10px 8px;border-top:1px solid var(--bd)}
.su{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:var(--r);background:var(--bg3);border:1px solid var(--bd);margin:0 0 8px}
.su-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;cursor:pointer;transition:all var(--ease);position:relative;overflow:hidden;border:2px solid transparent}
.su-av:hover{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
.su-av:hover::after{content:"📷";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.55);font-size:13px}
.su-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.su-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.su-role{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.sync-row{display:flex;align-items:center;gap:8px;padding:4px 12px;font-size:11px;color:var(--tx3)}
.sd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sd.ok{background:var(--green2);box-shadow:0 0 8px var(--green2)}
.sd.warn{background:var(--gold)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
.topbar{height:var(--th);background:rgba(12,9,7,.97);border-bottom:1px solid rgba(240,180,41,.08);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.pt{font-size:16px;font-weight:700;color:var(--tx);letter-spacing:-.2px}
.pp{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:1.5px;text-transform:uppercase;border:1px solid}
.pp.op{background:var(--gold-bg);color:var(--gold);border-color:rgba(240,180,41,.2)}
.pp.tec{background:var(--cyan-bg);color:var(--cyan);border-color:rgba(34,211,238,.2)}
.pp.cfg{background:var(--violet-bg);color:var(--violet);border-color:rgba(167,139,250,.2)}
.tb-r{margin-left:auto}
.clk{font-family:var(--FM);font-size:11px;color:var(--tx3);background:var(--bg3);padding:5px 11px;border-radius:var(--r);border:1px solid var(--bd);letter-spacing:.5px}
.content{flex:1;overflow-y:auto;padding:20px 24px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:var(--r);font-family:var(--F);font-size:12px;font-weight:600;cursor:pointer;transition:all var(--ease);border:none;padding:8px 14px;letter-spacing:.1px}
.bg{background:linear-gradient(135deg,var(--gold) 0%,#e8a020 100%);color:#1a0a00;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.bg:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(240,180,41,.35),0 1px 3px rgba(0,0,0,.3)}
.bs{background:transparent;color:var(--tx2);border:1px solid var(--bd2)}
.bs:hover{background:var(--bg4);color:var(--tx);border-color:var(--bd3)}
.bd{background:var(--red-bg);color:var(--red);border:1px solid rgba(251,113,133,.2)}
.bd:hover{background:rgba(251,113,133,.14);border-color:rgba(251,113,133,.35)}
.bgr{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.bsm{padding:5px 10px;font-size:11px}
.bic{background:transparent;border:1px solid var(--bd);border-radius:var(--r);width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--ease);color:var(--tx2);font-size:13px}
.bic:hover{background:var(--bg4);color:var(--tx);border-color:var(--bd2)}
.bic.ed:hover{background:var(--gold-bg);color:var(--gold);border-color:rgba(240,180,41,.3)}
.bic.dl:hover{background:var(--red-bg);color:var(--red);border-color:rgba(251,113,133,.3)}
.btn-ini{background:linear-gradient(135deg,rgba(6,78,59,.8),rgba(6,95,70,.9));color:#6ee7b7;border:1px solid rgba(52,211,153,.2);border-radius:var(--rl);padding:13px 20px;font-family:var(--F);font-size:14px;font-weight:700;cursor:pointer;transition:all var(--ease);display:flex;align-items:center;gap:10px;width:100%}
.btn-ini:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(52,211,153,.18)}
.btn-ini-v{background:linear-gradient(135deg,rgba(46,16,101,.8),rgba(59,7,100,.9));color:#c4b5fd;border:1px solid rgba(167,139,250,.2);border-radius:var(--rl);padding:13px 20px;font-family:var(--F);font-size:14px;font-weight:700;cursor:pointer;transition:all var(--ease);display:flex;align-items:center;gap:10px;width:100%}
.btn-ini-v:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(167,139,250,.18)}
.btn-fim{background:linear-gradient(135deg,rgba(69,10,10,.8),rgba(127,29,29,.9));color:#fca5a5;border:1px solid rgba(251,113,133,.2);border-radius:var(--rl);padding:9px 14px;font-family:var(--F);font-size:13px;font-weight:700;cursor:pointer;transition:all var(--ease);display:flex;align-items:center;gap:8px}
.btn-fim:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(251,113,133,.18)}

/* ── PANELS ── */
.panel{background:rgba(15,12,9,.8);border:1px solid rgba(240,180,41,.08);border-radius:var(--rl);overflow:hidden;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.ph{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.12)}
.ptitle{font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px;letter-spacing:.1px}
.pb{padding:16px}
.pf{padding:0}

/* ── KPI ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px;position:relative;overflow:hidden;transition:border-color var(--ease),box-shadow var(--ease)}
.kpi:hover{border-color:var(--bd2);box-shadow:0 4px 16px rgba(0,0,0,.2)}
.kpi-line{position:absolute;top:0;left:0;right:0;height:2px;border-radius:1px 1px 0 0}
.kpi-lbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:8px}
.kpi-val{font-size:28px;font-weight:800;line-height:1;letter-spacing:-.5px}
.kpi-sub{font-size:10px;color:var(--tx3);margin-top:5px;letter-spacing:.2px}
.kpi-ico{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:24px;opacity:.07}

/* ── TABLE ── */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:9px 12px;text-align:left;font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1.5px;border-bottom:1px solid var(--bd);background:rgba(0,0,0,.15);white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(22,32,53,.8);transition:background var(--ease)}
tbody tr:hover{background:rgba(17,31,48,.7)}
tbody tr:last-child{border-bottom:none}
td{padding:10px 12px;color:var(--tx);vertical-align:middle}
.code{font-family:var(--FM);font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500;display:inline-block;border:1px solid;letter-spacing:.5px}
.cc{color:var(--cyan);background:var(--cyan-bg);border-color:rgba(34,211,238,.15)}
.cv{color:var(--violet);background:var(--violet-bg);border-color:rgba(167,139,250,.15)}
.cg{color:var(--gold);background:var(--gold-bg);border-color:rgba(240,180,41,.15)}
.tda{display:flex;gap:4px;justify-content:flex-end}
.bdg{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-block;letter-spacing:.5px;text-transform:uppercase;border:1px solid}

/* ── FORM ── */
.fg{display:grid;gap:14px}
.fgrp{display:flex;flex-direction:column;gap:5px}
.flbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1.5px}
.req{color:var(--gold)}
.fc{background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r);color:var(--tx);font-family:var(--F);font-size:13px;padding:8px 11px;transition:border var(--ease),box-shadow var(--ease);outline:none;width:100%}
.fc:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
.fc option{background:var(--bg3)}
textarea.fc{resize:vertical;min-height:70px;line-height:1.5}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
input[type=datetime-local]::-webkit-calendar-picker-indicator{filter:invert(.4) sepia(1) saturate(2) hue-rotate(15deg);cursor:pointer}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(2,5,14,.9);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(12px)}
.ov.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--rxl);width:100%;max-width:540px;max-height:92vh;overflow-y:auto;transform:translateY(16px) scale(.98);transition:transform .2s cubic-bezier(.4,0,.2,1);box-shadow:0 24px 80px rgba(0,0,0,.6)}
.ov.open .modal{transform:none}
.mh{padding:18px 22px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.1)}
.mt{font-size:15px;font-weight:700;letter-spacing:-.1px}
.mc{background:var(--bg4);border:none;color:var(--tx2);width:26px;height:26px;border-radius:5px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all var(--ease)}
.mc:hover{color:var(--tx);background:var(--bg5)}
.mb{padding:18px 22px}
.mfoot{padding:12px 22px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;background:rgba(0,0,0,.08)}

/* ── TOAST ── */
.tc{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.ti{background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--rl);padding:10px 14px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:8px;min-width:260px;transform:translateX(120%);transition:transform .22s cubic-bezier(.4,0,.2,1);box-shadow:0 8px 30px rgba(0,0,0,.55)}
.ti.show{transform:none}
.tg{border-left:2px solid var(--green2)}
.tr{border-left:2px solid var(--red2)}
.ta{border-left:2px solid var(--gold)}
.tb{border-left:2px solid var(--blue)}


/* ── CATEGORY BROWSER (Paradas) ── */
.cb-wrap{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:14px}
.cb-title{font-size:9px;font-weight:700;color:var(--tx3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.cb-cats{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.cb-cat{font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;cursor:pointer;border:1px solid var(--bd2);color:var(--tx2);transition:all var(--ease);background:var(--bg4);white-space:nowrap}
.cb-cat:hover{color:var(--tx);border-color:var(--bd3);background:var(--bg5)}
.cb-cat.on{background:var(--red-bg);color:var(--red);border-color:rgba(251,113,133,.4)}
.cb-cat.on.tpt{background:var(--orange-bg);color:var(--orange);border-color:rgba(251,146,60,.4)}
.cb-cat.on.rh{background:var(--blue-bg);color:var(--blue);border-color:rgba(56,189,248,.4)}
.cb-cat.on.qual{background:var(--violet-bg);color:var(--violet);border-color:rgba(167,139,250,.4)}
.cb-cat.on.setup{background:var(--gold-bg);color:var(--gold);border-color:rgba(240,180,41,.4)}
.cb-cat.on.manut{background:var(--green-bg);color:var(--green);border-color:rgba(52,211,153,.4)}
.cb-sub{display:none;animation:fadeIn .12s ease}
.cb-sub.open{display:block}
.cb-codes{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.cb-code{font-size:11px;font-weight:700;padding:5px 11px;border-radius:8px;cursor:pointer;border:1px solid var(--bd2);color:var(--tx2);transition:all var(--ease);background:var(--bg4);display:flex;align-items:center;gap:5px}
.cb-code:hover{background:var(--bg5);color:var(--tx);border-color:var(--bd3)}
.cb-code .cc-badge{font-size:8px;font-weight:800;padding:1px 4px;border-radius:3px;background:rgba(251,113,133,.15);color:var(--red);letter-spacing:.5px}
.cb-info{background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);padding:10px 13px;font-size:11px;color:var(--tx2);min-height:36px;display:none}
.cb-info.show{display:block}
.cb-info-name{font-size:13px;font-weight:700;color:var(--tx);margin-bottom:5px}
.cb-info-tags{display:flex;flex-wrap:wrap;gap:5px}
.cb-itag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;display:inline-flex;align-items:center;gap:3px;letter-spacing:.5px}
.cb-itag.red{background:var(--red-bg);color:var(--red);border:1px solid rgba(251,113,133,.2)}
.cb-itag.org{background:var(--orange-bg);color:var(--orange);border:1px solid rgba(251,146,60,.2)}
.cb-itag.grn{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.cb-itag.blu{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(56,189,248,.2)}
.cb-itag.gld{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(240,180,41,.2)}
.cb-itag.vio{background:var(--violet-bg);color:var(--violet);border:1px solid rgba(167,139,250,.2)}
.cb-search{width:100%;background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);color:var(--tx);font-family:var(--F);font-size:12px;padding:7px 11px;outline:none;transition:border var(--ease)}
.cb-search:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(251,113,133,.1)}
.cb-results{max-height:140px;overflow-y:auto;margin-top:5px}
.cb-row{padding:7px 10px;font-size:11px;cursor:pointer;border-radius:5px;display:flex;align-items:center;gap:8px;transition:background var(--ease)}
.cb-row:hover{background:var(--bg4)}
.cb-row .rc{font-family:var(--FM);font-size:10px;font-weight:700;color:var(--red);background:var(--red-bg);padding:2px 6px;border-radius:4px;flex-shrink:0;min-width:32px;text-align:center}
.cb-row .rc.tpt{color:var(--orange);background:var(--orange-bg)}
.cb-row .rd{color:var(--tx2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cb-row .rt{font-size:9px;color:var(--tx3);flex-shrink:0}
.imp-prod-btn{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(6,78,59,.65),rgba(6,95,70,.8));color:#6ee7b7;border:1px solid rgba(52,211,153,.25);border-radius:var(--r);padding:7px 14px;font-size:11px;font-weight:700;cursor:pointer;transition:all var(--ease);letter-spacing:.3px}
.imp-prod-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(52,211,153,.15)}

/* ── ANIM ── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.pulse{animation:pulse 1.6s ease-in-out infinite}
.ldot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--red2);margin-right:5px;animation:pulse 1.2s ease-in-out infinite;vertical-align:middle}
.tlive{font-family:var(--FM);font-size:11px;color:var(--red);font-weight:600;letter-spacing:.5px}

/* ── TYPE SWITCH — ANIMATED ── */
.tsw{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.topt{border-radius:14px;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;
  text-align:center;padding:20px 12px 16px;position:relative;overflow:hidden;border:2px solid transparent}
.topt:not(.sel):hover{transform:translateY(-2px)}
/* STOP card */
.topt.sm{background:linear-gradient(155deg,#0e0206 0%,#0b0104 100%);border-color:rgba(200,20,40,.18)}
.topt.sm:not(.sel):hover{border-color:rgba(220,30,50,.4)}
.topt.sm.sel{border-color:rgba(255,30,55,.7);background:linear-gradient(155deg,#1c0307 0%,#110105 100%);
  box-shadow:0 0 0 1px rgba(255,30,55,.22),0 8px 36px rgba(200,10,30,.38),inset 0 0 60px rgba(180,0,20,.06)}
/* RUN card */
.topt.sp{background:linear-gradient(155deg,#020e0a 0%,#020b07 100%);border-color:rgba(52,211,153,.12)}
.topt.sp:not(.sel):hover{border-color:rgba(52,211,153,.35)}
.topt.sp.sel{border-color:rgba(52,211,153,.62);background:linear-gradient(155deg,#041c12 0%,#031309 100%);
  box-shadow:0 0 0 1px rgba(52,211,153,.18),0 8px 36px rgba(16,185,129,.28),inset 0 0 60px rgba(52,211,153,.05)}
/* top bar */
.topt-bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0}
.topt.sm   .topt-bar{background:linear-gradient(90deg,#ff0022,#ff6644,#ff0022);background-size:200% 100%;animation:tbar 1.1s linear infinite}
.topt.sm:not(.sel).topt-bar,.topt:not(.sel).sm .topt-bar{animation:none;opacity:.15}
.topt.sp   .topt-bar{background:linear-gradient(90deg,#10b981,#34d399);opacity:.6}
.topt:not(.sel).sp .topt-bar{opacity:.1}
@keyframes tbar{0%{background-position:0%}100%{background-position:200%}}
.topt .tlbl{font-size:14px;font-weight:800;letter-spacing:.3px;margin-bottom:3px}
.topt .tsub{font-size:10px;opacity:.55;margin-top:5px;letter-spacing:.3px}
.topt .tvis{height:70px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
/* SIREN SVG */
@keyframes sirenFlash{0%,100%{filter:drop-shadow(0 0 10px #ff0022) drop-shadow(0 0 22px #ff0022);opacity:1}45%,55%{filter:none;opacity:.35}}
@keyframes beamL{0%,100%{opacity:0;transform:rotate(-38deg) scaleY(.3)}35%,65%{opacity:.85;transform:rotate(-38deg) scaleY(1)}}
@keyframes beamR{0%,100%{opacity:0;transform:rotate(38deg) scaleY(.3)}35%,65%{opacity:.85;transform:rotate(38deg) scaleY(1)}}
.sv-wrap{position:relative;display:inline-flex;align-items:flex-end;justify-content:center}
.sv-body{animation:sirenFlash 1s ease-in-out infinite}
.topt:not(.sel) .sv-body{animation:none;opacity:.22;filter:none}
.sv-bl{position:absolute;bottom:24px;left:50%;width:3px;height:30px;border-radius:2px;background:linear-gradient(to top,#ff2233,transparent);transform-origin:50% 100%;animation:beamL 1s .0s ease-in-out infinite}
.sv-br{position:absolute;bottom:24px;left:50%;width:3px;height:30px;border-radius:2px;background:linear-gradient(to top,#ff2233,transparent);transform-origin:50% 100%;animation:beamR 1s .5s ease-in-out infinite}
.topt:not(.sel) .sv-bl,.topt:not(.sel) .sv-br{animation:none;opacity:0}
/* GEAR SVG */
@keyframes gCW {from{transform:rotate(  0deg)}to{transform:rotate( 360deg)}}
@keyframes gCCW{from{transform:rotate(  0deg)}to{transform:rotate(-360deg)}}
@keyframes gGlow{0%,100%{filter:drop-shadow(0 0 5px #34d399) drop-shadow(0 0 12px #10b981)}50%{filter:drop-shadow(0 0 10px #34d399) drop-shadow(0 0 24px #10b981)}}
.gv-wrap{display:flex;align-items:flex-end;gap:0}
.gv-big{animation:gCW  3s linear infinite;transform-origin:center center}
.gv-sml{animation:gCCW 1.5s linear infinite;transform-origin:center center;margin-left:-8px;margin-bottom:4px}
.gv-wrap svg{animation:gGlow 2.2s ease-in-out infinite}
.topt:not(.sel) .gv-big,.topt:not(.sel) .gv-sml{animation:none}
.topt:not(.sel) .gv-wrap svg{animation:none;opacity:.25;filter:none}


/* ── APROVEITAMENTO ── */
.apr-toggle{display:flex;align-items:center;gap:7px;padding:8px 12px;border-radius:var(--r);
  border:1px dashed var(--bd2);cursor:pointer;font-size:11px;font-weight:700;color:var(--tx3);
  background:transparent;transition:all var(--ease);margin-top:2px;width:100%}
.apr-toggle:hover{border-color:var(--violet);color:var(--violet);background:var(--violet-bg)}
.apr-toggle.open{border-color:rgba(167,139,250,.4);color:var(--violet);background:var(--violet-bg)}
.apr-toggle .apr-ico{width:20px;height:20px;border-radius:50%;background:var(--violet-bg);
  border:1px solid rgba(167,139,250,.35);display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;color:var(--violet);line-height:1;transition:transform .2s}
.apr-toggle.open .apr-ico{transform:rotate(45deg)}
.apr-block{display:none;margin-top:10px;animation:fadeIn .15s ease}
.apr-block.open{display:block}
.apr-header{font-size:9px;font-weight:700;color:var(--tx3);letter-spacing:2px;text-transform:uppercase;
  margin-bottom:8px;display:flex;align-items:center;gap:6px}
.apr-item{display:grid;grid-template-columns:1fr auto;gap:6px;align-items:start;
  background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);
  padding:10px 10px 10px 12px;margin-bottom:6px;position:relative}
.apr-item:last-child{margin-bottom:0}
.apr-item-left{display:flex;flex-direction:column;gap:4px}
.apr-cod-input{background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);
  color:var(--tx);font-family:var(--FM);font-size:12px;font-weight:600;padding:6px 10px;
  outline:none;transition:border var(--ease);width:100%;text-transform:uppercase}
.apr-cod-input:focus{border-color:var(--violet);box-shadow:0 0 0 2px rgba(167,139,250,.12)}
.apr-hint{font-size:10px;color:var(--violet);min-height:14px;padding-left:2px;font-weight:500}
.apr-qtd-row{display:flex;align-items:center;gap:6px;margin-top:2px}
.apr-qtd-lbl{font-size:9px;color:var(--tx3);font-weight:700;text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
.apr-qtd-inp{background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);
  color:var(--tx);font-family:var(--FM);font-size:12px;padding:4px 8px;outline:none;
  transition:border var(--ease);width:70px;text-align:center}
.apr-qtd-inp:focus{border-color:var(--violet)}
.apr-del{background:var(--red-bg);border:1px solid rgba(251,113,133,.2);border-radius:var(--r);
  color:var(--red);font-size:14px;width:28px;height:28px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:all var(--ease);flex-shrink:0;align-self:center}
.apr-del:hover{background:rgba(251,113,133,.18);border-color:rgba(251,113,133,.4)}
.apr-add-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:var(--r);
  border:1px dashed rgba(167,139,250,.3);cursor:pointer;font-size:11px;font-weight:600;
  color:var(--tx3);background:transparent;transition:all var(--ease);margin-top:8px;width:100%}
.apr-add-btn:hover{border-color:var(--violet);color:var(--violet);background:var(--violet-bg)}
.apr-count-badge{background:var(--violet-bg);color:var(--violet);border:1px solid rgba(167,139,250,.3);
  font-size:9px;font-weight:800;padding:1px 6px;border-radius:10px;letter-spacing:.5px}
/* ── APONT GRID ── */
.apg{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.apc{border-radius:var(--rxl);padding:20px;border:1px solid var(--bd);background:var(--bg2)}
.apc-title{font-size:16px;font-weight:800;letter-spacing:-.2px;margin-bottom:4px}
.apc-sub{font-size:12px;color:var(--tx2);margin-bottom:16px}
.actv{background:var(--bg3);border-radius:var(--rl);padding:12px 14px;margin-bottom:8px;transition:border-color var(--ease)}
.actv.ap{border:1px solid rgba(251,113,133,.18)}
.actv.am{border:1px solid rgba(167,139,250,.18)}
.actv:hover.ap{border-color:rgba(251,113,133,.38)}
.actv:hover.am{border-color:rgba(167,139,250,.38)}

/* ── BARS ── */
.br{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.br-l{font-size:11px;color:var(--tx2);width:110px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.br-t{flex:1;background:var(--bg4);border-radius:4px;height:6px;overflow:hidden;border:1px solid var(--bd)}
.br-f{height:100%;border-radius:4px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.br-v{font-family:var(--FM);font-size:10px;color:var(--tx3);width:34px;text-align:right}
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;padding:12px 16px}
.mc2{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:11px}
.dg2c{display:grid;grid-template-columns:3fr 2fr;gap:14px;margin-bottom:16px}
.af{padding:10px 0;border-bottom:1px solid rgba(22,32,53,.8);display:flex;gap:10px}
.af:last-child{border-bottom:none}
.af-d{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0}
.af-m{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.af-s{font-size:10px;color:var(--tx3);margin-top:2px}
.af-r{text-align:right;flex-shrink:0}
.af-dr{font-size:13px;font-weight:700;color:var(--gold)}
.af-t{font-size:10px;color:var(--tx3);font-family:var(--FM)}

/* ── LOOKUP ── */
.lk-hint{font-size:11px;color:var(--violet);margin-top:4px;min-height:16px;font-weight:500}
.lk-drop{position:absolute;left:0;right:0;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r);z-index:50;display:none;max-height:180px;overflow-y:auto;top:100%;margin-top:2px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.lk-item{padding:8px 11px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--bd)}
.lk-item:hover{background:var(--bg4);color:var(--tx)}
.lk-item:last-child{border-bottom:none}

/* ── CONFIG ── */
.cfg-box{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:18px;margin-bottom:14px}
.cfg-t{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:12px;letter-spacing:.2px;text-transform:uppercase}
pre.cb{background:var(--bg);border:1px solid var(--bd2);border-radius:var(--r);padding:12px;font-family:var(--FM);font-size:10px;color:var(--tx2);overflow:auto;line-height:1.8;max-height:280px}
.step{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.stn{width:22px;height:22px;border-radius:50%;background:var(--gold-bg);color:var(--gold);border:1px solid rgba(240,180,41,.3);font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.stt{font-size:12px;color:var(--tx2);line-height:1.6;padding-top:2px}

/* ── LOGIN SCREEN ── */
#ls{position:fixed;inset:0;z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;
  background:
    repeating-linear-gradient(135deg,transparent 0,transparent 30px,rgba(240,180,41,.025) 30px,rgba(240,180,41,.025) 31px),
    repeating-linear-gradient(45deg,transparent 0,transparent 30px,rgba(240,180,41,.015) 30px,rgba(240,180,41,.015) 31px),
    radial-gradient(ellipse 120% 80% at 0% 100%,rgba(240,140,20,.12) 0%,transparent 50%),
    radial-gradient(ellipse 80% 60% at 100% 0%,rgba(180,80,0,.08) 0%,transparent 45%),
    radial-gradient(ellipse 60% 60% at 50% 50%,rgba(30,20,10,.0) 0%,transparent 70%),
    linear-gradient(160deg,#100c08 0%,#080604 40%,#0c0906 70%,#100c08 100%);
}
#ls::before{content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23f0b429' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events:none;z-index:0;
}
#ls>*{position:relative;z-index:1}
.ls-card{background:rgba(15,12,9,.92);border:1px solid rgba(240,180,41,.15);border-radius:20px;width:100%;max-width:400px;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,.9),0 0 60px rgba(240,140,20,.08),0 0 0 1px rgba(240,180,41,.08);backdrop-filter:blur(20px)}
.ls-top{padding:28px 28px 20px;text-align:center;border-bottom:1px solid rgba(240,180,41,.12);background:linear-gradient(180deg,rgba(240,140,20,.1) 0%,rgba(240,140,20,.03) 50%,transparent 100%);border-top:2px solid rgba(240,180,41,.4)}
.ls-lion{width:72px;height:72px;border-radius:16px;background:rgba(0,0,0,.6);overflow:hidden;margin:0 auto 14px;border:1px solid rgba(240,180,41,.4);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 4px rgba(240,180,41,.1),0 0 30px rgba(240,140,20,.2)}
.ls-lion img{width:100%;height:100%;object-fit:contain}
.ls-brand{font-size:18px;font-weight:800;letter-spacing:.5px;color:var(--tx)}
.ls-brand em{color:var(--gold);font-style:normal}
.ls-sub{font-size:9px;color:var(--tx3);letter-spacing:2.5px;text-transform:uppercase;margin-top:5px;font-weight:600}
.ls-body{padding:22px 28px 26px}
.ls-tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--r);padding:3px;margin-bottom:18px;border:1px solid var(--bd)}
.ls-tab{flex:1;padding:7px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:700;color:var(--tx3);text-align:center;transition:all var(--ease);letter-spacing:.5px;text-transform:uppercase}
.ls-tab:hover{color:var(--tx)}
.ls-tab.on{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(240,180,41,.2)}
.role-g{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.role-o{background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r);padding:12px 8px;cursor:pointer;text-align:center;transition:all var(--ease)}
.role-o:hover{border-color:var(--bd3);background:var(--bg4)}
.role-o.sop{background:var(--blue-bg);border-color:rgba(56,189,248,.3)}
.role-o.stc{background:var(--gold-bg);border-color:rgba(240,180,41,.3)}
.role-o .ri{font-size:20px;display:block;margin-bottom:5px}
.role-o .rl{font-size:11px;font-weight:700;letter-spacing:.3px}
.role-o .rs{font-size:9px;color:var(--tx3);margin-top:2px}
.role-o.stc .rl{color:var(--gold)}
.role-o.sop .rl{color:var(--blue)}
.ls-err{font-size:11px;color:var(--red);margin-top:8px;min-height:16px;font-weight:500;text-align:center}
.ls-link{font-size:11px;color:var(--tx3);cursor:pointer;text-align:center;display:block;margin-top:12px;transition:color var(--ease)}
.ls-link:hover{color:var(--gold);text-decoration:underline}
.u-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r);cursor:pointer;transition:all var(--ease);border:1px solid transparent;margin-bottom:3px}
.u-item:hover{background:var(--bg3);border-color:var(--bd)}
.u-item.sel{background:var(--bg4);border-color:var(--bd2)}
.u-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}

@media(max-width:900px){.sb{display:none}.kpi-row{grid-template-columns:1fr 1fr}.dg2c{grid-template-columns:1fr}.apg{grid-template-columns:1fr}}
@media(max-width:600px){.kpi-row{grid-template-columns:1fr}.fr2{grid-template-columns:1fr}}

/* ── EYE TOGGLE ── */
.pw-wrap{position:relative;display:flex;align-items:center}
.pw-wrap .fc{padding-right:38px;flex:1}
.pw-eye{position:absolute;right:10px;background:none;border:none;cursor:pointer;color:var(--tx3);padding:4px;display:flex;align-items:center;justify-content:center;transition:color var(--ease);line-height:1}
.pw-eye:hover{color:var(--gold)}

/* ── POLISH ── */
.es{text-align:center;padding:44px 20px;color:var(--tx3)}
.es-i{font-size:32px;margin-bottom:10px;display:block;opacity:.25}
.dg{background:var(--green-bg);color:var(--green);border-color:rgba(52,211,153,.2)}
.dg2{background:var(--gold-bg);color:var(--gold);border-color:rgba(240,180,41,.2)}
.dr{background:var(--red-bg);color:var(--red);border-color:rgba(251,113,133,.2)}
.db{background:var(--blue-bg);color:var(--blue);border-color:rgba(56,189,248,.2)}
.dv{background:var(--violet-bg);color:var(--violet);border-color:rgba(167,139,250,.2)}
.dgy{background:var(--bg4);color:var(--tx2);border-color:var(--bd)}
.content>*{animation:fadeIn .18s ease both}

</style>
</head>

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>

  </div>
  <div class="sb-foot">
    <input type="file" id="ul-prod" accept=".xlsx,.xls" style="display:none" onchange="hdImpProd(this)">
    <button class="imp-prod-btn" onclick="document.getElementById('ul-prod').click()" style="width:100%;justify-content:center;margin-bottom:8px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Importar Produtividade

// ══ FIREBASE REALTIME DATABASE SYNC ═══════════════════════════════
const FB_PATH='/apontaki_v5.json';
let _fbPolling=null;

async function fbSave(){
  if(!DB.config||!DB.config.firebaseEnabled||!DB.config.firebaseUrl)return;
  const base=DB.config.firebaseUrl.replace(/\/$/,'');
  const token=DB.config.firebaseToken;
  const url=base+FB_PATH+(token?'?auth='+encodeURIComponent(token):'');
  try{
    const r=await fetch(url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(DB)});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=document.getElementById('sdot'),l=document.getElementById('slbl');
    if(d){d.className='sd ok';l.textContent='Firebase ✓ sincronizado';}
  }catch(e){
    const d=document.getElementById('sdot'),l=document.getElementById('slbl');
    if(d){d.className='sd warn';l.textContent='Firebase: erro ao salvar';}
    console.error('[Firebase] fbSave',e);
  }
}

async function fbLoad(){
  if(!DB.config||!DB.config.firebaseEnabled||!DB.config.firebaseUrl)return false;
  const base=DB.config.firebaseUrl.replace(/\/$/,'');
  const token=DB.config.firebaseToken;
  const url=base+FB_PATH+(token?'?auth='+encodeURIComponent(token):'');
  const d=document.getElementById('sdot'),l=document.getElementById('slbl');
  try{
    if(d){d.className='sd warn';l.textContent='Firebase: sincronizando…';}
    const r=await fetch(url);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    if(data&&typeof data==='object'&&data.apontamentos!==undefined){
      const savedCfg={
        sheetsUrl:DB.config.sheetsUrl,sheetsEnabled:DB.config.sheetsEnabled,
        firebaseUrl:DB.config.firebaseUrl,firebaseToken:DB.config.firebaseToken,
        firebaseEnabled:DB.config.firebaseEnabled
      };
      DB=Object.assign(defDB(),data);
      DB.config=Object.assign(DB.config||{},savedCfg);
      if(!DB.cfgRequests)DB.cfgRequests={};
      // Preservar usuário logado localmente caso não esteja no Firebase ainda
      if(typeof CU!=='undefined'&&CU){
        const found=DB.users.find(u=>String(u.id)===String(CU.id));
        if(!found){DB.users.push(CU);}
        else{Object.assign(found,CU);}
      }
      localStorage.setItem(KEY,JSON.stringify(DB));
      if(d){d.className='sd ok';l.textContent='Firebase ✓ sincronizado';}
      return true;
    }
    if(d){d.className='sd warn';l.textContent='Firebase: banco vazio (primeiro uso)';}
    return false;
  }catch(e){
    if(d){d.className='sd warn';l.textContent='Firebase: erro de conexão';}
    console.error('[Firebase] fbLoad',e);
    return false;
  }
}

function fbStartPoll(){
  if(_fbPolling)clearInterval(_fbPolling);
  if(!DB.config||!DB.config.firebaseEnabled||!DB.config.firebaseUrl)return;
  _fbPolling=setInterval(async function(){
    const before=JSON.stringify(DB.apontamentos);
    const ok=await fbLoad();
    if(ok){
      const after=JSON.stringify(DB.apontamentos);
      if(before!==after){
        ub();
        const active=document.querySelector('.view.active');
        if(active){const v=active.id.replace('view-','');({dashboard:rDash,apont:rApont,hist:rHist})[v]?.();}
      }
      // Verificar aprovação de acesso
      if(CU&&!isIvan()&&DB.cfgRequests&&DB.cfgRequests[CU.id]){
        const req=DB.cfgRequests[CU.id];
        if(req.status==='approved'&&Date.now()<req.expiry&&!req._notified){
          DB.cfgRequests[CU.id]._notified=true;
          toast('✅ IVAN liberou seu acesso à Configuração por 1 hora!','g');
          updCfgBadge();
        }
      }
      // IVAN: atualizar badge de solicitações pendentes
      if(isIvan())updCfgBadge();
    }
  },20000);
}

function toast(msg,t='g'){
  const c=document.getElementById('tc');
  const el=document.createElement('div');
  el.className=`ti t${t}`;
  el.innerHTML=`<span>${{g:'✓',r:'✕',a:'!',b:'↑'}[t]||'•'}</span>${esc(msg)}`;

  const u={id:nid(DB.users),nome,role:regRole,senha};

  localStorage.setItem(KEY,JSON.stringify(DB));

function handleAvatarUpload(input){
  if(!input.files || !input.files[0]) return;
  const file = input.files[0];
  if(!file.type.startsWith('image/')){ toast('Selecione uma imagem.','r'); return; }
  if(file.size > 2*1024*1024){ toast('Imagem muito grande (máx. 2MB).','r'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    CU.foto = e.target.result;
    const u = DB.users.find(x => x.id === CU.id);
    if(u) u.foto = e.target.result;

  };
  reader.readAsDataURL(file);
}

// ══ ACESSO CONFIG — SISTEMA DE SOLICITAÇÃO (IVAN APROVA) ══════════
function isIvan(){return CU&&CU.nome.toUpperCase().trim()==='IVAN';}

function chkCfgAccess(){
  if(!CU)return false;
  if(isIvan())return true; // IVAN tem acesso direto sempre
  if(!DB.cfgRequests)return false;
  const req=DB.cfgRequests[CU.id];
  if(!req||req.status!=='approved')return false;
  return Date.now()<req.expiry;
}

function solicitarCfgAccess(){
  if(!DB.cfgRequests)DB.cfgRequests={};
  const existing=DB.cfgRequests[CU.id];
  // Já tem acesso aprovado e válido
  if(existing&&existing.status==='approved'&&Date.now()<existing.expiry){sv('config');return;}
  // Já tem solicitação pendente
  if(existing&&existing.status==='pending'){
    om('⏳ Aguardando Liberação',`
      <div style="text-align:center;padding:16px 0">
        <div style="font-size:48px;margin-bottom:12px">⏳</div>
        <p style="color:var(--tx);font-size:14px;font-weight:700">Sua solicitação foi enviada</p>
        <p style="color:var(--tx2);font-size:12px;margin-top:8px">Aguardando IVAN liberar o acesso.<br>Assim que aprovado, você será notificado automaticamente.</p>
        <div style="margin-top:16px;padding:10px;background:var(--bg3);border-radius:8px;border:1px solid var(--bd)">
          <span style="font-size:11px;color:var(--tx3)">Solicitado em: ${fdt(existing.solicitadoEm)}</span>
        </div>
      </div>
    `,null,'Fechar',true);
    return;
  }
  // Criar nova solicitação
  DB.cfgRequests[CU.id]={userId:CU.id,nome:CU.nome,role:CU.role,solicitadoEm:new Date().toISOString(),status:'pending',expiry:null};
  sdb();
  toast('📨 Solicitação enviada ao IVAN!','g');
  om('📨 Solicitação Enviada',`
    <div style="text-align:center;padding:16px 0">
      <div style="font-size:48px;margin-bottom:12px">📨</div>
      <p style="color:var(--tx);font-size:14px;font-weight:700">Solicitação enviada com sucesso!</p>
      <p style="color:var(--tx2);font-size:12px;margin-top:8px">O IVAN será notificado e liberará seu acesso.<br>Você receberá uma notificação automática assim que aprovado.</p>
    </div>
  `,null,'Fechar',true);
  updCfgBadge();
}

function aprovarCfgAccess(uid){
  if(!DB.cfgRequests||!DB.cfgRequests[uid])return;
  DB.cfgRequests[uid]={...DB.cfgRequests[uid],status:'approved',expiry:Date.now()+3600000,aprovadoEm:new Date().toISOString()};
  sdb();toast('✅ Acesso liberado por 1 hora!','g');rCfg();
}

function negarCfgAccess(uid){
  if(!DB.cfgRequests||!DB.cfgRequests[uid])return;
  DB.cfgRequests[uid]={...DB.cfgRequests[uid],status:'denied'};
  sdb();toast('Solicitação recusada.','a');rCfg();
}

function limparSolicitacao(uid){
  if(!DB.cfgRequests)return;
  delete DB.cfgRequests[uid];sdb();rCfg();
}

function getCfgTimer(){
  if(!CU)return null;
  if(isIvan())return null;
  if(!DB.cfgRequests)return null;
  const req=DB.cfgRequests[CU.id];
  if(!req||req.status!=='approved')return null;
  const rem=req.expiry-Date.now();
  if(rem<=0)return null;
  const m=Math.floor(rem/60000),s=Math.floor((rem%60000)/1000);
  return`${m}:${String(s).padStart(2,'0')}`;
}

function getPendingRequests(){
  if(!DB.cfgRequests)return[];
  return Object.values(DB.cfgRequests).filter(r=>r.status==='pending');
}

function updCfgBadge(){
  const nb=document.getElementById('nav-config');if(!nb)return;
  let badge=nb.querySelector('.cfg-req-badge');
  if(isIvan()){
    const count=getPendingRequests().length;
    if(count>0){
      if(!badge){badge=document.createElement('span');badge.className='cfg-req-badge nb';nb.appendChild(badge);}
      badge.textContent=count;badge.style.display='inline';
    }else if(badge){badge.style.display='none';}
  }
  // Timer para outros técnicos
  const timer=getCfgTimer();
  let timerEl=nb.querySelector('.cfg-timer');
  if(timer){
    if(!timerEl){timerEl=document.createElement('span');timerEl.className='cfg-timer';timerEl.style.cssText='font-size:9px;color:var(--cyan);margin-left:auto';nb.appendChild(timerEl);}
    timerEl.textContent=`⏱ ${timer}`;
  }else if(timerEl){timerEl.textContent='';}
}

function sv(v){
  if(TEC_ROUTES.includes(v)&&(!CU||CU.role!=='tecnico')){toast('Acesso restrito ao Técnico.','r');return;}
  // Operacional só acessa Apontamento
  if(CU&&CU.role==='operacional'&&v!=='apont'){
    if(v==='dashboard'||v==='hist'){sv('apont');return;}
  }
  if(v==='config'){if(!chkCfgAccess()){solicitarCfgAccess();return;}}
  cv=v;
  document.querySelectorAll('.ni').forEach(e=>e.classList.remove('on'));
  const n=document.getElementById('nav-'+v);if(n)n.classList.add('on');
  const[t,p,pl]=VM[v]||[v,'op',''];
  document.getElementById('pg-title').textContent=t;
  const pp=document.getElementById('pg-pill');pp.textContent=pl;pp.className='pp '+p;

  ub();us();
}

function us(){
  const d=document.getElementById('sdot'),l=document.getElementById('slbl');
  if(!d)return;
  if(DB.config.firebaseEnabled&&DB.config.firebaseUrl){d.className='sd ok';l.textContent='Firebase ✓ ativo';}

}

// ══ SHEETS ═════════════════════════════════════════════════════════
async function sendSheets(a){
  if(!DB.config.sheetsEnabled||!DB.config.sheetsUrl)return{ok:false};
  const maq=a.maqId?gmaq(a.maqId):{codigo:'',nome:'',setor:''},pes=gpes(a.pesId);
  const dur=a.fim?cm2(a.inicio,a.fim):null;
  const pl={id:a.id,tipo:a.tipo,maquinaCod:maq.codigo,maquinaNome:maq.nome,maquinaSetor:maq.setor,
    operadorMatricula:pes.matricula,operadorNome:pes.nome,
    inicio:fdt(a.inicio),fim:a.fim?fdt(a.fim):'Em andamento',
    duracaoMin:dur??'',duracaoFmt:dur!=null?fdur(dur):'Em andamento',obs:a.obs||'',
    status:a.status,enviadoEm:new Date().toISOString()};
  if(a.tipo==='parada'){const pr=gpar(a.parId);pl.paradaCod=pr.codigo;pl.paradaDesc=pr.descricao;pl.paradaCat=pr.categoria;}
  else{const pec=a.pecId?gpec(a.pecId):null;const op=gop(a.opId);pl.pecaCod=pec?pec.codigo:(a.pecCod||'');pl.pecaDesc=pec?pec.descricao:(a.pecNome||'');pl.operacao=op.nome;pl.quantidade=a.qtd||'';}
  try{const r=await fetch(DB.config.sheetsUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(pl)});const d=await r.json();return{ok:d.success===true};}
  catch(e){return{ok:false};}
}

// SVG engrenagens animadas
function _svGears(){
  // gear path: n dentes, raio interno r, raio externo R
  function gearPath(n,r,R){
    const s=Math.PI*2/n,pts=[];
    for(let i=0;i<n;i++){
      const a=s*i,b=a+s*.28,c=a+s*.5,d=a+s*.78;
      pts.push(r*Math.cos(a),r*Math.sin(a));
      pts.push(R*Math.cos(b),R*Math.sin(b));
      pts.push(R*Math.cos(c),R*Math.sin(c));
      pts.push(r*Math.cos(d),r*Math.sin(d));
    }
    return'M'+pts.map((v,i)=>(i%2===0?(i>0?'L':'')+v.toFixed(2):','+v.toFixed(2))).join('')+'Z';
  }
  const big=gearPath(9,16,22);
  const sml=gearPath(6,9,13);
  return`<div class="gv-wrap">
    <svg class="gv-big" width="50" height="50" viewBox="-25 -25 50 50">
      <path d="${big}" fill="#34d399" opacity=".92"/>
      <circle r="8" fill="#020e0a"/>
      <circle r="4" fill="#34d399" opacity=".35"/>
    </svg>
    <svg class="gv-sml" width="32" height="32" viewBox="-16 -16 32 32">
      <path d="${sml}" fill="#10b981" opacity=".88"/>
      <circle r="5" fill="#020e0a"/>
      <circle r="2.5" fill="#10b981" opacity=".38"/>
    </svg>
  </div>`;
}

// Piece lookup
function lkPeca(val){
  const cod=val.trim().toUpperCase();
  const hint=document.getElementById('pc-hint');
  const drop=document.getElementById('pc-drop');
  if(!cod){if(hint)hint.textContent='';if(drop)drop.style.display='none';return;}
  const exact=DB.pecas.find(p=>p.codigo.toUpperCase()===cod);
  if(exact){if(hint)hint.innerHTML='<span style="color:var(--green)">✓</span> '+esc(exact.descricao);if(drop)drop.style.display='none';return;}
  if(hint)hint.textContent='';
  const matches=DB.pecas.filter(p=>p.codigo.toUpperCase().includes(cod)||p.descricao.toUpperCase().includes(cod));
  if(matches.length&&drop){drop.style.display='block';drop.innerHTML=matches.map(p=>`<div class="lk-item" onclick="selPeca('${esc(p.codigo).replace(/'/g,"\'")}','${esc(p.descricao).replace(/'/g,"\'")}')"><span class="code cv" style="font-size:9px">${esc(p.codigo)}</span> <span style="color:var(--tx2);margin-left:6px">${esc(p.descricao)}</span></div>`).join('');}
  else if(drop)drop.style.display='none';
}
function selPeca(cod,nome){
  const inp=document.getElementById('pc-cod');if(inp)inp.value=cod;
  const hint=document.getElementById('pc-hint');if(hint)hint.innerHTML='<span style="color:var(--green)">✓</span> '+esc(nome);
  const drop=document.getElementById('pc-drop');if(drop)drop.style.display='none';
}
document.addEventListener('click',e=>{const d=document.getElementById('pc-drop');if(d&&!d.contains(e.target)&&e.target.id!=='pc-cod')d.style.display='none';});

// ── APROVEITAMENTO ──────────────────────────────────────────────────────────
let _aprItems=[];

function toggleApr(){
  const blk=document.getElementById('apr-block');
  const btn=document.getElementById('apr-toggle');
  const open=blk.classList.contains('open');
  if(open){
    blk.classList.remove('open');
    btn.classList.remove('open');
  } else {
    blk.classList.add('open');
    btn.classList.add('open');
    if(_aprItems.length===0) addAprItem();
  }
}

function addAprItem(){
  const idx=Date.now();
  _aprItems.push({idx,cod:'',qtd:''});
  _renderAprList();
  // focus new input
  setTimeout(()=>{const el=document.getElementById('apr-c-'+idx);if(el)el.focus();},60);
}

function removeAprItem(idx){
  _aprItems=_aprItems.filter(i=>i.idx!=idx);
  _renderAprList();
  _updAprBadge();
  if(_aprItems.length===0){
    document.getElementById('apr-block').classList.remove('open');
    document.getElementById('apr-toggle').classList.remove('open');
  }
}

function _renderAprList(){
  const list=document.getElementById('apr-list');
  if(!list)return;
  if(_aprItems.length===0){list.innerHTML='';return;}
  list.innerHTML=_aprItems.map((it,i)=>`
    <div class="apr-item" id="apr-item-${it.idx}">
      <div class="apr-item-left">
        <div style="position:relative">
          <input class="apr-cod-input" id="apr-c-${it.idx}"
            value="${esc(it.cod)}"
            placeholder="Código ${i+1}..."
            oninput="aprLk(${it.idx},this.value)"
            autocomplete="off">
          <div class="apr-hint" id="apr-h-${it.idx}">${it.desc?'✓ '+esc(it.desc):''}</div>
          <div class="lk-drop" id="apr-drop-${it.idx}" style="position:absolute;z-index:60;top:100%;left:0;right:0"></div>
        </div>
        <div class="apr-qtd-row">
          <span class="apr-qtd-lbl">Qtd inicial:</span>
          <input class="apr-qtd-inp" id="apr-q-${it.idx}" type="number" min="0"
            value="${it.qtd||''}" placeholder="0"
            oninput="_aprItems.find(x=>x.idx==${it.idx}).qtd=this.value">
        </div>
      </div>
      <button class="apr-del" onclick="removeAprItem(${it.idx})" title="Remover">✕</button>
    </div>`).join('');
  _updAprBadge();
}

function aprLk(idx,val){
  const it=_aprItems.find(x=>x.idx==idx);
  if(!it)return;
  it.cod=val.trim().toUpperCase();
  it.desc='';
  const hint=document.getElementById('apr-h-'+idx);
  const drop=document.getElementById('apr-drop-'+idx);
  if(!val.trim()){if(hint)hint.textContent='';if(drop)drop.style.display='none';_updAprBadge();return;}
  const cod=it.cod;
  const exact=DB.pecas.find(p=>p.codigo.toUpperCase()===cod);
  if(exact){
    it.desc=exact.descricao;
    if(hint)hint.innerHTML='<span style="color:var(--green)">✓</span> '+esc(exact.descricao);
    if(drop)drop.style.display='none';
    _updAprBadge();return;
  }
  const matches=DB.pecas.filter(p=>p.codigo.toUpperCase().includes(cod)||p.descricao.toUpperCase().includes(cod)).slice(0,10);
  if(matches.length&&drop){
    drop.style.display='block';
    drop.innerHTML=matches.map(p=>`<div class="lk-item" onclick="aprSel(${idx},'${esc(p.codigo).replace(/'/g,"\\'")}','${esc(p.descricao).replace(/'/g,"\\'")}')">
      <span class="code cv" style="font-size:9px">${esc(p.codigo)}</span>
      <span style="font-size:11px;color:var(--tx2);margin-left:6px">${esc(p.descricao)}</span>
    </div>`).join('');
  } else if(drop) drop.style.display='none';
  _updAprBadge();
}

function aprSel(idx,cod,desc){
  const it=_aprItems.find(x=>x.idx==idx);
  if(!it)return;
  it.cod=cod; it.desc=desc;
  const inp=document.getElementById('apr-c-'+idx);
  if(inp)inp.value=cod;
  const hint=document.getElementById('apr-h-'+idx);
  if(hint)hint.innerHTML='<span style="color:var(--green)">✓</span> '+esc(desc);
  const drop=document.getElementById('apr-drop-'+idx);
  if(drop)drop.style.display='none';
  _updAprBadge();
}

function _updAprBadge(){

function iniPeca(){
  const cod=(document.getElementById('pc-cod')?.value||'').trim().toUpperCase();
  const opId=+document.getElementById('pc-op').value;
  const maqId=+document.getElementById('pc-maq').value||null;
  const pesId=+document.getElementById('pc-pes').value;
  const inicio=document.getElementById('pc-dt').value;
  const obs=document.getElementById('pc-obs').value.trim();
  if(!cod||!opId||!pesId||!inicio){toast('Preencha os campos obrigatórios.','r');return;}

  // Registrar peça principal
  const pr=DB.pecas.find(p=>p.codigo.toUpperCase()===cod);
  DB.apontamentos.push({id:nid(DB.apontamentos),tipo:'peca',pecId:pr?pr.id:null,pecCod:cod,
    pecNome:pr?pr.descricao:'',opId,maqId,pesId,inicio,fim:null,qtd:null,obs,status:'andamento',syncado:false});

  // Registrar aproveitamentos (códigos adicionais)
  const aprovs=_aprItems.filter(x=>x.cod.trim());
  aprovs.forEach(it=>{
    const codA=it.cod.trim().toUpperCase();
    const pa=DB.pecas.find(p=>p.codigo.toUpperCase()===codA);
    DB.apontamentos.push({id:nid(DB.apontamentos),tipo:'peca',pecId:pa?pa.id:null,pecCod:codA,
      pecNome:pa?pa.descricao:'',opId,maqId,pesId,inicio,fim:null,
      qtd:it.qtd?+it.qtd:null,obs:obs?obs+' [APR]':'[APR]',status:'andamento',syncado:false});
  });

  // Reset aproveitamento
  _aprItems=[];
  sdb();
  const total=1+aprovs.length;
  toast(total>1?`${total} peças iniciadas (${cod} + ${aprovs.length} apr.)`:`Peça iniciada! ${cod}`,'a');
  ub();rApont();
}

// ══ HISTÓRICO ══════════════════════════════════════════════════════
function rHist(){
  const list=[...DB.apontamentos].sort((a,b)=>new Date(b.inicio)-new Date(a.inicio));
  document.getElementById('content').innerHTML=`
  <div class="panel"><div class="ph"><div class="ptitle">📋 Histórico</div>
    <div style="display:flex;gap:8px">
      <select class="fc" id="hf-t" onchange="fHist()" style="width:120px;font-size:11px;padding:5px 8px"><option value="">Todos</option><option value="peca">Peça</option><option value="parada">Parada</option></select>
      <input class="fc" type="text" id="hf-q" placeholder="Buscar..." oninput="fHist()" style="width:170px;font-size:11px;padding:5px 8px">
    </div>
  </div><div class="pf" id="hbody">${hRows(list)}</div></div>`;
}
function hRows(list){
  if(!list.length)return`<div class="es"><span class="es-i">📋</span>Nenhum registro.</div>`;
  return`<div class="tw"><table><thead><tr><th>Tipo</th><th>Máquina/Peça</th><th>Operador</th><th>Código/Operação</th><th>Início</th><th>Fim</th><th>Duração</th><th>Qtd</th><th>Status</th><th>Sheets</th><th></th></tr></thead><tbody>
  ${list.map(a=>{
    const ps=gpes(a.pesId),ip=a.tipo==='peca',and=a.status==='andamento';
    const mq=a.maqId?gmaq(a.maqId):null;
    const pCod=ip?(a.pecId?gpec(a.pecId).codigo:(a.pecCod||'?')):'';
    const pNom=ip?(a.pecId?gpec(a.pecId).descricao:(a.pecNome||'')):'';
    const prin=ip?`${esc(pCod)}<br><span style="font-size:10px;color:var(--tx3)">${esc(pNom)}</span>`:`${mq?esc(mq.nome):'?'}<br><span class="code cc" style="font-size:9px">${mq?esc(mq.codigo):'?'}</span>`;
    const cod=ip?`<span class="code cv">${esc(gop(a.opId).nome)}</span>`:`<span class="code cc">${esc(gpar(a.parId).codigo)}</span><br><span style="font-size:10px;color:var(--tx2)">${esc(gpar(a.parId).descricao)}</span>`;
    return`<tr><td><span class="bdg ${ip?'dv':'dr'}">${ip?'PEÇA':'PARADA'}</span></td><td>${prin}</td><td>${esc(ps.nome)}</td><td>${cod}</td><td style="font-family:var(--FM);font-size:10px;color:var(--tx2)">${fdt(a.inicio)}</td><td style="font-family:var(--FM);font-size:10px;color:var(--tx2)">${fdt(a.fim)}</td><td>${and?`<span class="bdg dr pulse">ATIVO</span>`:`<span class="bdg dg">${fdur(cm2(a.inicio,a.fim))}</span>`}</td><td style="font-family:var(--FM);font-size:11px;text-align:center">${a.qtd!=null?a.qtd:'—'}</td><td><span class="bdg ${and?'dr':'dgy'}">${and?'ANDAMENTO':'ENCERRADO'}</span></td><td style="text-align:center;font-size:14px">${a.syncado?'✅':'⬜'}</td><td><div class="tda">${and?`<button class="btn bsm bgr" onclick="setAT('${a.tipo}');sv('apont')">Encerrar</button>`:''}
    <button class="bic ed" onclick="edA(${a.id})">✎</button><button class="bic dl" onclick="delA(${a.id})">🗑</button></div></td></tr>`;}).join('')}
  </tbody></table></div>`;
}
function fHist(){
  const t=document.getElementById('hf-t')?.value,q=(document.getElementById('hf-q')?.value||'').toLowerCase();
  let list=[...DB.apontamentos].sort((a,b)=>new Date(b.inicio)-new Date(a.inicio));
  if(t)list=list.filter(a=>a.tipo===t);
  if(q)list=list.filter(a=>{const ps=gpes(a.pesId),mq=a.maqId?gmaq(a.maqId):null;
    const x=a.tipo==='peca'?[a.pecCod||'',gpec(a.pecId||0).descricao||'',gop(a.opId).nome]:[gpar(a.parId).codigo,gpar(a.parId).descricao,mq?mq.nome:''];
    return[ps.nome,...x,a.obs||''].some(v=>v.toLowerCase().includes(q));});
  document.getElementById('hbody').innerHTML=hRows(list);
}
function edA(id){
  const a=DB.apontamentos.find(x=>x.id==id);if(!a)return;
  const pesO=DB.pessoas.map(p=>`<option value="${p.id}" ${a.pesId==p.id?'selected':''}>${esc(p.matricula)} — ${esc(p.nome)}</option>`).join('');
  const maqO=`<option value="">Sem máquina</option>`+DB.maquinas.map(m=>`<option value="${m.id}" ${a.maqId==m.id?'selected':''}>${esc(m.codigo)} — ${esc(m.nome)}</option>`).join('');
  let ex='';
  if(a.tipo==='parada'){
    const parO=DB.paradas.map(p=>`<option value="${p.id}" ${a.parId==p.id?'selected':''}>[${esc(p.codigo)}] ${esc(p.descricao)}</option>`).join('');
    ex=`<div class="fgrp"><label class="flbl">Máquina</label><select class="fc" id="ea-maq">${maqO}</select></div><div class="fgrp"><label class="flbl">Código Parada</label><select class="fc" id="ea-par"><option value="">...</option>${parO}</select></div>`;
  } else {
    const opO=DB.operacoes.map(o=>`<option value="${o.id}" ${a.opId==o.id?'selected':''}>${esc(o.nome)}</option>`).join('');
    ex=`<div class="fgrp"><label class="flbl">Código Peça</label><input class="fc" type="text" id="ea-pec" value="${esc(a.pecCod||'')}"></div><div class="fgrp"><label class="flbl">Operação</label><select class="fc" id="ea-op">${opO}</select></div><div class="fgrp"><label class="flbl">Máquina</label><select class="fc" id="ea-maq">${maqO}</select></div><div class="fgrp"><label class="flbl">Qtd</label><input class="fc" type="number" id="ea-qtd" value="${a.qtd||''}"></div>`;
  }
  om('Editar Apontamento #'+id,`<div class="fg"><div class="fgrp"><label class="flbl">Operador</label><select class="fc" id="ea-pes"><option value="">...</option>${pesO}</select></div>${ex}<div class="fr2"><div class="fgrp"><label class="flbl">Início</label><input class="fc" type="datetime-local" id="ea-ini" value="${a.inicio||''}"></div><div class="fgrp"><label class="flbl">Fim</label><input class="fc" type="datetime-local" id="ea-fim" value="${a.fim||''}"></div></div><div class="fgrp"><label class="flbl">Observação</label><textarea class="fc" id="ea-obs">${esc(a.obs||'')}</textarea></div></div>`,()=>{
    const pesId=+document.getElementById('ea-pes').value,inicio=document.getElementById('ea-ini').value,fim=document.getElementById('ea-fim').value||null,obs=document.getElementById('ea-obs').value.trim(),maqId=+document.getElementById('ea-maq').value||null;
    if(!pesId||!inicio){toast('Campos obrigatórios.','r');return;}
    const up={...a,pesId,maqId,inicio,fim,obs,status:fim?'encerrado':'andamento',syncado:false};
    if(a.tipo==='parada')up.parId=+document.getElementById('ea-par').value;
    else{const c=(document.getElementById('ea-pec')?.value||'').trim().toUpperCase();const pr=DB.pecas.find(p=>p.codigo.toUpperCase()===c);up.pecCod=c;up.pecId=pr?pr.id:null;up.pecNome=pr?pr.descricao:'';up.opId=+document.getElementById('ea-op').value;up.qtd=+document.getElementById('ea-qtd').value||null;}
    const i=DB.apontamentos.findIndex(x=>x.id==id);DB.apontamentos[i]=up;sdb();cm();toast('Atualizado!','a');rHist();ub();
  });
}
function delA(id){oc('Excluir este apontamento?',()=>{DB.apontamentos=DB.apontamentos.filter(a=>a.id!=id);sdb();toast('Excluído.','a');rHist();ub();});}

// Static category map — covers all P1-P37 and T1-T17
const PAR_CATS = {
  'Manutenção':    {icon:'🔧', cls:'manut', codes:['P1','P2','P17','P21','P23','P29','T1','T2','T14','T15']},
  'Setup/Regulagem':{icon:'⚙️', cls:'setup', codes:['P5','P8','P9','P37']},
  'Utilidades':    {icon:'⚡', cls:'',      codes:['P3','P4','P22','P33']},
  'Logística':     {icon:'📦', cls:'',      codes:['P6','P7','P10','P11','P30','P31','P32','P35','T7','T9']},
  'Operacional':   {icon:'👷', cls:'',      codes:['P13','P14','P16','P18','P19','P20','P24','P25','P28','P34','P36']},
  'RH / Saúde':    {icon:'🏥', cls:'rh',    codes:['P12','P19','P26','T4','T8']},
  'Qualidade':     {icon:'🔍', cls:'qual',  codes:['P15','P27','T3','T10','T12','T13']},
  'Produção/Efic.':{icon:'🏭', cls:'tpt',   codes:['T5','T6','T11','T16','T17']},
  'Especial':      {icon:'📋', cls:'',      codes:['EMP','FALTA','HORA EXTRA']},
};

// Auto-derive category for a stop code description
function _catParada(cod, desc){
  const c=String(cod||'').toUpperCase();
  const d=String(desc||'').toUpperCase();
  for(const[cat,v] of Object.entries(PAR_CATS)){
    if(v.codes.includes(c)) return cat;
  }
  // fallback by keyword
  if(d.includes('MANUTEN')&&(d.includes('MECÂN')||d.includes('ELÉT')||d.includes('ELETRI')))return'Manutenção';
  if(d.includes('SETUP')||d.includes('PREPARA')||d.includes('REGULAG')||d.includes('AJUSTE')||d.includes('PROGRAMAN'))return'Setup/Regulagem';
  if(d.includes('RH')||d.includes('ACIDENTE')||d.includes('REMÉDIO')||d.includes('TREINA')||d.includes('REUNI'))return'RH / Saúde';
  if(d.includes('QUALID')||d.includes('RETRABALHO')||d.includes('REFUGO')||d.includes('TESTANDO'))return'Qualidade';
  if(d.includes('FALTA')||d.includes('MATERIAL')||d.includes('MATÉRIA')||d.includes('MOVIMENTA')||d.includes('AGUARDAN'))return'Logística';
  if(d.includes('ENERGIA')||d.includes('AR COMP')||d.includes('FONTE')||d.includes('INTERNET'))return'Utilidades';
  if(d.includes('LUBRIF')||d.includes('AFIAÇÃO')||d.includes('CAVACO')||d.includes('LIMPEZA'))return'Manutenção';
  return'Operacional';
}

// Build category browser HTML for the stop form
function buildParBrowser(){
  if(!DB.paradas.length) return `<div style="font-size:11px;color:var(--tx3);padding:10px 0">📂 Importe o Excel de Produtividade para carregar os códigos de parada com categorias.</div>`;
  
  // Group DB.paradas by category
  const groups={};
  DB.paradas.forEach(p=>{
    const cat=p.categoria||_catParada(p.codigo,p.descricao);
    if(!groups[cat])groups[cat]=[];
    groups[cat].push(p);
  });

  // Compute stats from stopHistory
  const statsByCod={};
  (DB.stopHistory||[]).forEach(s=>{
    if(!s.cod)return;
    if(!statsByCod[s.cod])statsByCod[s.cod]={cnt:0,maqSet:new Set()};
    statsByCod[s.cod].cnt++;
    if(s.maq)statsByCod[s.cod].maqSet.add(s.maq);
  });

  // Tabs
  const tabs=Object.entries(groups).map(([cat,arr])=>{
    const v=PAR_CATS[cat]||{icon:'📌',cls:''};
    return`<div class="cb-cat ${v.cls}" onclick="cbTab(this,'${esc(cat)}')" data-cat="${esc(cat)}">${v.icon} ${esc(cat)} <span style="opacity:.5;font-size:9px">(${arr.length})</span></div>`;
  }).join('');

  // Sub-panels
  const subs=Object.entries(groups).map(([cat,arr])=>{
    const catId='cb-'+cat.replace(/[^a-z0-9]/gi,'_');
    const codes=arr.map(p=>{
      const st=statsByCod[p.codigo];
      const isTpt=p.tipo==='T.P.T'||p.codigo.startsWith('T');
      return`<div class="cb-code" onclick="cbSel(${p.id},'${esc(p.codigo).replace(/'/g,"\\'")}','${esc(p.descricao).replace(/'/g,"\\'")}','${esc(cat)}')" data-cod="${esc(p.codigo)}">
        <span class="cc-badge ${isTpt?'tpt':''}">${esc(p.codigo)}</span>
        <span style="font-size:10px;color:var(--tx2);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.descricao)}</span>
        ${st?`<span style="font-size:9px;color:var(--tx3)">${st.cnt}×</span>`:''}
      </div>`;
    }).join('');
    return`<div class="cb-sub" id="${catId}">
      <div class="cb-codes">${codes}</div>
      <div class="cb-info" id="${catId}_info"></div>
    </div>`;
  }).join('');

  return`<div class="cb-wrap">
    <div class="cb-title">🔍 Busca por Categoria — <span style="color:var(--red)">${DB.paradas.length} códigos carregados</span>
      <span style="margin-left:auto;font-size:9px;color:var(--tx3);font-weight:500">${DB.stopHistory&&DB.stopHistory.length?DB.stopHistory.length+' registros históricos':''}</span>
    </div>
    <input class="cb-search" type="text" placeholder="🔎  Buscar código ou descrição... (ex: P8, RH, Manutenção)" oninput="cbSearch(this.value)" autocomplete="off">
    <div class="cb-results" id="cb-search-res" style="display:none"></div>
    <div class="cb-cats" style="margin-top:8px">${tabs}</div>
    ${subs}
  </div>`;
}

function cbTab(el, cat){
  document.querySelectorAll('.cb-cat').forEach(t=>t.classList.remove('on'));
  const catId='cb-'+cat.replace(/[^a-z0-9]/gi,'_');
  const allOpen=document.getElementById(catId)?.classList.contains('open');
  document.querySelectorAll('.cb-sub').forEach(s=>s.classList.remove('open'));
  document.getElementById('cb-search-res').style.display='none';
  if(!allOpen){
    el.classList.add('on');
    const sub=document.getElementById(catId);
    if(sub)sub.classList.add('open');
  }
}

function cbSel(id,cod,desc,cat){
  // fill the select
  const sel=document.getElementById('pi-par');
  if(sel){sel.value=id;}
  // show info card
  const catId='cb-'+cat.replace(/[^a-z0-9]/gi,'_');
  const info=document.getElementById(catId+'_info');
  if(info){
    // compute maquinas from history
    const hist=(DB.stopHistory||[]).filter(s=>s.cod===cod);
    const maqSet=[...new Set(hist.map(s=>s.maq).filter(Boolean))];
    const isTpt=cod.startsWith('T');
    const tipo=isTpt?'T.P.T — Tempo Perdido Total':'T.P.P — Tempo Perdido Planejado';
    const tipoTag=isTpt?'org':'red';
    info.innerHTML=`<div class="cb-info-name">[${esc(cod)}] ${esc(desc)}</div>
      <div class="cb-info-tags">
        <span class="cb-itag ${tipoTag}">${tipo}</span>
        <span class="cb-itag gld">📂 ${esc(cat)}</span>
        ${hist.length?`<span class="cb-itag grn">📊 ${hist.length} ocorrências</span>`:''}
        ${maqSet.length?`<span class="cb-itag blu">🏭 ${maqSet.join(' · ')}</span>`:''}
      </div>`;
    info.classList.add('show');
  }
  // highlight selected code chip
  document.querySelectorAll('.cb-code').forEach(c=>c.style.background='');
  const clicked=document.querySelector(`.cb-code[data-cod="${cod}"]`);
  if(clicked)clicked.style.cssText='background:var(--red-bg);border-color:rgba(251,113,133,.4);color:var(--red)';
}

function cbSearch(val){
  const res=document.getElementById('cb-search-res');
  if(!val.trim()){res.style.display='none';return;}
  const q=val.trim().toUpperCase();
  const matches=DB.paradas.filter(p=>
    p.codigo.toUpperCase().includes(q)||
    p.descricao.toUpperCase().includes(q)||
    (p.categoria||'').toUpperCase().includes(q)
  ).slice(0,20);
  if(!matches.length){res.innerHTML=`<div class="cb-row"><span class="rd">Nenhum código encontrado</span></div>`;res.style.display='block';return;}
  res.style.display='block';
  // hide cat subs while searching
  document.querySelectorAll('.cb-sub').forEach(s=>s.classList.remove('open'));
  document.querySelectorAll('.cb-cat').forEach(t=>t.classList.remove('on'));
  res.innerHTML=matches.map(p=>{
    const isTpt=p.codigo.startsWith('T');
    const hist=(DB.stopHistory||[]).filter(s=>s.cod===p.codigo);
    return`<div class="cb-row" onclick="cbSrSel(${p.id},'${esc(p.codigo).replace(/'/g,"\\'")}','${esc(p.descricao).replace(/'/g,"\\'")}')">
      <span class="rc ${isTpt?'tpt':''}">${esc(p.codigo)}</span>
      <span class="rd">${esc(p.descricao)}</span>
      ${hist.length?`<span class="rt">${hist.length}×</span>`:''}
      <span class="rt" style="color:var(--tx3);font-size:8px">${esc(p.categoria||'')}</span>
    </div>`;
  }).join('');
}

function cbSrSel(id,cod,desc){
  const sel=document.getElementById('pi-par');
  if(sel)sel.value=id;
  const res=document.getElementById('cb-search-res');
  // clear search
  const si=document.querySelector('.cb-search');if(si)si.value='';
  if(res)res.style.display='none';
  // show toast with code info
  const isTpt=cod.startsWith('T');
  toast(`[${cod}] ${desc} — ${isTpt?'T.P.T':'T.P.P'}`,'b');
}

// Lê: PARADAS (códigos), APONTAMENTO USINAGEM (histórico), máquinas e operadores
function hdImpProd(input){
  if(!input.files.length)return;
  const file=input.files[0];
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      let st={par:0,hist:0,maq:0,pes:0,dup:0};

      // 1. PARADAS → DB.paradas (todos os P1-P37, T1-T17, EMP, FALTA, HORA EXTRA)
      const parSheet=wb.SheetNames.find(n=>/^PARADAS$/i.test(n.trim()));
      if(parSheet){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[parSheet],{header:1,defval:''});
        rows.forEach(r=>{
          const cod=String(r[0]||'').trim().toUpperCase();
          const desc=String(r[1]||'').trim();
          const tipo=String(r[2]||'').trim()||'T.P.P';
          if(!cod||!desc)return;
          if(DB.paradas.some(p=>p.codigo===cod)){st.dup++;return;}
          const cat=_catParada(cod,desc);
          DB.paradas.push({id:nid(DB.paradas),codigo:cod,descricao:desc,categoria:cat,tipo,prioridade:'media'});
          st.par++;
        });
      }

      // 2. APONTAMENTO USINAGEM → operadores, máquinas, histórico de paradas
      const apSheet=wb.SheetNames.find(n=>/APONTAMENTO USINAGEM/i.test(n.trim()));
      if(apSheet){
        if(!DB.stopHistory)DB.stopHistory=[];
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[apSheet],{header:1,defval:''});
        const opSet=new Set(), maqSet=new Set();
        rows.forEach((r,i)=>{
          if(i===0)return; // skip header
          const op=String(r[0]||'').trim();
          const maq=String(r[1]||'').trim();
          const data=r[2];
          const cod=String(r[3]||'').trim().toUpperCase();
          const tipo=String(r[4]||'').trim();
          // INICIO col5, FIM col6, both are time objects serialized as floats
          const iniF=r[5],fimF=r[6];
          // TOTAL PARADA (col7) is a formula, col8 decimal — try col8
          const totalDec=parseFloat(r[8])||null;
          if(op) opSet.add(op);
          if(maq) maqSet.add(maq);
          // only store rows that have a real stop code
          if(cod && cod!=='' && !/^=/.test(cod)){
            const exists=DB.stopHistory.some(s=>s.op===op&&s.maq===maq&&s.cod===cod&&String(s.data)===String(data)&&s.iniF===iniF);
            if(!exists){
              DB.stopHistory.push({op,maq,data:data?new Date(data).toISOString().slice(0,10):'',cod,tipo,totalDec});
              st.hist++;
            }
          }
        });
        // Add new operators
        opSet.forEach(nome=>{
          if(!nome||DB.pessoas.some(p=>p.nome.toUpperCase()===nome.toUpperCase()))return;
          DB.pessoas.push({id:nid(DB.pessoas),matricula:'OP'+String(DB.pessoas.length+1).padStart(3,'0'),nome,cargo:'Operador Usinagem',turno:'M'});
          st.pes++;
        });
        // Add new machines (normalize GLORY 1/2 → GLORY)
        maqSet.forEach(nome=>{
          if(!nome||DB.maquinas.some(m=>m.codigo.toUpperCase()===nome.toUpperCase()))return;
          DB.maquinas.push({id:nid(DB.maquinas),codigo:nome,nome,setor:'Usinagem',status:'ativo'});
          st.maq++;
        });
      }

      sdb();
      // refresh current view
      const cv=document.querySelector('.ni.on');
      if(cv){const vn=cv.id?.replace('nav-','');({apont:rApont,paradas:rPar,pessoas:rPes,maquinas:rMaq})[vn]?.();}
      
      om('✅ Importação Concluída',`
        <div style="margin-bottom:14px;padding:10px 14px;background:var(--green-bg);border:1px solid rgba(52,211,153,.25);border-radius:var(--r);font-size:12px;color:var(--green)">
          Arquivo: <strong>${esc(file.name)}</strong>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
          <div style="background:var(--red-bg);border:1px solid rgba(251,113,133,.2);border-radius:var(--r);padding:14px;text-align:center">
            <div style="font-size:32px;font-weight:800;color:var(--red)">${st.par}</div>
            <div style="font-size:10px;color:var(--tx3);margin-top:4px;text-transform:uppercase;letter-spacing:1px">Códigos de Parada</div>
            <div style="font-size:9px;color:var(--tx3);margin-top:2px">P1–P37 · T1–T17 · Especiais</div>
          </div>
          <div style="background:var(--orange-bg);border:1px solid rgba(251,146,60,.2);border-radius:var(--r);padding:14px;text-align:center">
            <div style="font-size:32px;font-weight:800;color:var(--orange)">${st.hist}</div>
            <div style="font-size:10px;color:var(--tx3);margin-top:4px;text-transform:uppercase;letter-spacing:1px">Registros Históricos</div>
            <div style="font-size:9px;color:var(--tx3);margin-top:2px">do APONTAMENTO USINAGEM</div>
          </div>
          <div style="background:var(--gold-bg);border:1px solid rgba(240,180,41,.2);border-radius:var(--r);padding:14px;text-align:center">
            <div style="font-size:32px;font-weight:800;color:var(--gold)">${st.maq}</div>
            <div style="font-size:10px;color:var(--tx3);margin-top:4px;text-transform:uppercase;letter-spacing:1px">Máquinas</div>
            <div style="font-size:9px;color:var(--tx3);margin-top:2px">SKT160 · DMC · GLORY · etc.</div>
          </div>
          <div style="background:var(--blue-bg);border:1px solid rgba(56,189,248,.2);border-radius:var(--r);padding:14px;text-align:center">
            <div style="font-size:32px;font-weight:800;color:var(--blue)">${st.pes}</div>
            <div style="font-size:10px;color:var(--tx3);margin-top:4px;text-transform:uppercase;letter-spacing:1px">Operadores</div>
            <div style="font-size:9px;color:var(--tx3);margin-top:2px">Anderson · Heber · Ítalo…</div>
          </div>
        </div>
        <div style="padding:10px 12px;background:var(--violet-bg);border:1px solid rgba(167,139,250,.2);border-radius:var(--r);font-size:11px;color:var(--violet)">
          💡 Acesse <strong>Apontamento</strong> e escolha <strong>Parada</strong> para ver o painel de categorias (Manutenção, RH/Saúde, Setup, Qualidade...) com todos os ${st.par+st.dup} códigos organizados.
        </div>
        ${st.dup?`<div style="margin-top:8px;font-size:10px;color:var(--tx3)">${st.dup} códigos já existentes foram ignorados.</div>`:''}
      `,null,'Fechar',true);
    }catch(err){toast('Erro ao ler Excel: '+err.message,'r');console.error(err);}
  };
  reader.readAsArrayBuffer(file);
}

function dlXl(type){
  const s=XS[type];if(!s)return;
  const wb=XLSX.utils.book_new();
  const rows=s.getData().map(item=>s.fields.reduce((o,f,i)=>{o[s.headers[i]]=item[f]||'';return o;},{}));
  const ws=XLSX.utils.json_to_sheet(rows.length?rows:[s.headers.reduce((o,h)=>{o[h]='';return o;},{})],{header:s.headers});
  ws['!cols']=s.headers.map(()=>({wch:26}));
  XLSX.utils.book_append_sheet(wb,ws,s.label);
  const wi=XLSX.utils.aoa_to_sheet([['INSTRUÇÕES'],[''],['Obrigatórias:',s.headers.slice(0,2).join(', ')],['Opcionais:',s.headers.slice(2).join(', ')||'—'],...(s.note?[['Valores:',s.note]]:[]),[''],['Como importar:'],['1. Preencha os dados na aba "'+s.label+'"'],['2. Salve como .xlsx'],['3. Clique em Importar Excel'],['4. Duplicatas são ignoradas automaticamente']]);
  wi['!cols']=[{wch:20},{wch:50}];
  XLSX.utils.book_append_sheet(wb,wi,'Instruções');
  XLSX.writeFile(wb,`APONTAKI_${type.toUpperCase()}_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast(`Excel de ${s.label} gerado!`,'g');
}
function ulXl(type){const inp=document.getElementById('ul-'+type);if(inp){inp.value='';inp.click();}}
function hdImp(type,input){
  const s=XS[type];if(!s||!input.files.length)return;
  const file=input.files[0];
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const wsName=wb.SheetNames.find(n=>n===s.label)||wb.SheetNames[0];
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wsName],{defval:''});
      let added=0,skip=0,inv=0;
      rows.forEach(row=>{const p=s.parse(row);if(!s.validate(p)){inv++;return;}if(s.unique(p)){skip++;return;}s.push(p);added++;});
      sdb();s.refresh();
      om(`Importação — ${s.label}`,`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
        <div style="background:var(--green-bg);border:1px solid rgba(52,211,153,.2);border-radius:var(--r);padding:14px;text-align:center"><div style="font-size:28px;font-weight:800;color:var(--green)">${added}</div><div style="font-size:10px;color:var(--tx3);margin-top:4px;text-transform:uppercase;letter-spacing:1px">Adicionados</div></div>
        <div style="background:var(--gold-bg);border:1px solid rgba(240,180,41,.2);border-radius:var(--r);padding:14px;text-align:center"><div style="font-size:28px;font-weight:800;color:var(--gold)">${skip}</div><div style="font-size:10px;color:var(--tx3);margin-top:4px;text-transform:uppercase;letter-spacing:1px">Duplicatas</div></div>
        <div style="background:var(--red-bg);border:1px solid rgba(251,113,133,.2);border-radius:var(--r);padding:14px;text-align:center"><div style="font-size:28px;font-weight:800;color:var(--red)">${inv}</div><div style="font-size:10px;color:var(--tx3);margin-top:4px;text-transform:uppercase;letter-spacing:1px">Inválidos</div></div>
      </div><div style="font-size:12px;color:var(--tx2)">Arquivo: <span style="color:var(--gold);font-family:var(--FM)">${esc(file.name)}</span></div>`,null,'Fechar',true);
    }catch(err){toast('Erro ao ler arquivo: '+err.message,'r');}
  };
  reader.readAsArrayBuffer(file);
}
